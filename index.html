<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電氣技能考核管理總覽 / Management Summary Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .chart-container { position: relative; width: 100%; height: 320px; }
        .matrix-grid {
            display: grid;
            grid-template-columns: minmax(380px, 3.5fr) repeat(8, minmax(95px, 1fr));
            gap: 1px;
            background-color: #cbd5e1;
            border: 1px solid #cbd5e1;
        }
        .matrix-cell {
            background-color: white;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            min-height: 68px;
            line-height: 1.2;
            text-align: center;
        }
        .matrix-header { background-color: #f8fafc; font-weight: 800; color: #334155; }
        .matrix-row-label { justify-content: flex-start; padding-left: 1.25rem; color: #1e293b; background-color: #fcfdfe; text-align: left; }
        .status-pass { background-color: #10b981; color: white; }
        .status-fail { background-color: #ef4444; color: white; }
        .status-pending { background-color: #e2e8f0; color: #64748b; }
        .score-high { background-color: #1e40af; color: white; }
        .score-mid { background-color: #3b82f6; color: white; }
        .score-low { background-color: #93c5fd; color: #1e3a8a; }
        .topic-sep { background-color: #1e293b; font-weight: 900; color: white; grid-column: span 9; text-transform: uppercase; padding: 1rem; text-align: left; }
        input.edit-input { width: 100%; height: 100%; border: 2px solid #3b82f6; text-align: center; font-size: 0.75rem; border-radius: 6px; outline: none; background-color: #f0f9ff; }
        input.edit-name-input { width: 100%; border: 1px dashed #3b82f6; padding: 2px 4px; font-size: 0.75rem; border-radius: 4px; outline: none; background-color: #fff; color: #1e293b; font-weight: 700; }
        
        .sidebar-link.active { background-color: #ffffff; color: #2563eb; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .card-shadow { box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 2rem; width: 80%; max-width: 800px; border-radius: 1rem; position: relative; }
    </style>
</head>
<body class="text-slate-900">

    <aside class="fixed left-0 top-0 w-64 bg-slate-900 hidden lg:flex flex-col h-screen z-40">
        <div class="p-8 text-left">
            <div class="flex items-center gap-3 mb-10">
                <span class="text-3xl">📊</span>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-white leading-none text-left">管理決策系統</h1>
                    <p class="text-[9px] text-slate-400 font-bold mt-1 uppercase tracking-widest text-left">Decision Support SPA</p>
                </div>
            </div>
            <nav class="space-y-2 text-left">
                <button onclick="switchTab('report')" id="btn-report" class="sidebar-link w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 text-slate-400 active transition-all">
                    <span>🏠</span> 管理總覽 / Summary
                </button>
                <button onclick="switchTab('matrix')" id="btn-matrix" class="sidebar-link w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 text-slate-400 transition-all">
                    <span>📋</span> 技能矩陣 / Matrix
                </button>
                <button onclick="switchTab('analytics')" id="btn-analytics" class="sidebar-link w-full text-left px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-3 text-slate-400 transition-all">
                    <span>🧬</span> 深度分析 / Analysis
                </button>
            </nav>
        </div>
        
        <div class="mt-auto p-6 border-t border-slate-800 space-y-2">
            <input type="file" id="import-input" class="hidden" accept=".json,.xlsx" onchange="handleImport(event)">
            <button onclick="document.getElementById('import-input').click()" class="w-full bg-slate-700 hover:bg-slate-600 text-slate-200 text-[10px] font-bold py-2 rounded-lg transition-all">
                匯入數據備份 / Import
            </button>
            <button onclick="exportToExcel()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold py-2 rounded-lg transition-all">
                下載 Excel 備份 / Export
            </button>
            <div class="text-[9px] text-slate-500 font-medium italic text-center">系統狀態：數據儲存於本地</div>
        </div>
    </aside>

    <main class="lg:ml-64 p-4 md:p-8 min-h-screen">
        <section id="tab-report" class="space-y-6 animate-in fade-in duration-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center">
                <div class="text-left">
                    <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight text-left">電氣技能考核管理總結</h2>
                    <p class="text-slate-500 mt-1 italic text-left">報表生成日期：<span id="current-date">--</span></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.print()" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-50">列印</button>
                    <button onclick="openReportModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg">生成報告</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="bg-white p-6 rounded-2xl card-shadow border-t-4 border-blue-500 text-left">
                    <div class="text-slate-400 text-xs font-bold uppercase mb-1">整體進度 Progress</div>
                    <div class="text-4xl font-black text-slate-800" id="stat-progress">--%</div>
                    <div class="w-full bg-slate-100 h-1.5 rounded-full mt-3"><div id="progress-bar-inner" class="bg-blue-500 h-full rounded-full transition-all" style="width: 0%"></div></div>
                </div>
                <div class="bg-white p-6 rounded-2xl card-shadow border-t-4 border-emerald-500 text-left">
                    <div class="text-slate-400 text-xs font-bold uppercase mb-1">團隊平均分 Team Avg</div>
                    <div class="text-4xl font-black text-slate-800" id="stat-avg-score">--</div>
                </div>
                <div class="bg-white p-6 rounded-2xl card-shadow border-t-4 border-indigo-500 text-left">
                    <div class="text-slate-400 text-xs font-bold uppercase mb-1">實作達標率 Practical</div>
                    <div class="text-4xl font-black text-slate-800" id="stat-practical">--%</div>
                </div>
                <div class="bg-white p-6 rounded-2xl card-shadow border-t-4 border-rose-500 text-left">
                    <div class="text-slate-400 text-xs font-bold uppercase mb-1">識別弱項 Gaps</div>
                    <div class="text-4xl font-black text-rose-600" id="stat-attention">--</div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl card-shadow">
                    <h3 class="font-bold text-slate-700 mb-4 border-b pb-2 text-left">團隊職能均衡度</h3>
                    <div class="chart-container"><canvas id="radarChartSummary"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-2xl card-shadow flex flex-col">
                    <h3 class="font-bold text-slate-700 mb-4 border-b pb-2 text-left">戰略性技能缺口</h3>
                    <div id="skill-gaps" class="space-y-4 flex-1 text-left"></div>
                    <div class="bg-amber-50 p-4 rounded-xl mt-4 border border-amber-100 text-left">
                        <h4 class="text-xs font-bold text-amber-800 uppercase text-left">管理建議</h4>
                        <p class="text-xs text-amber-700 mt-1 text-left" id="mgr-suggestion">分析中...</p>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl card-shadow">
                <h3 class="font-bold text-slate-700 mb-4 border-b pb-2 text-left">人員考核參與度與得分概覽</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-slate-400 uppercase text-[10px] font-bold border-b">
                                <th class="pb-3 text-left">技術人員</th>
                                <th class="pb-3 text-left">完成率</th>
                                <th class="pb-3 text-left">已考項平均分</th>
                                <th class="pb-3 text-left">加權累積總分</th>
                                <th class="pb-3 text-right">備註</th>
                            </tr>
                        </thead>
                        <tbody id="personnel-status-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="tab-matrix" class="hidden space-y-6">
            <div class="flex justify-between items-end">
                <h2 class="text-2xl font-bold text-left">技能矩陣編輯器 (可直接編輯名稱)</h2>
                <button id="edit-toggle-btn" onclick="toggleEditMode()" class="bg-slate-900 text-white px-6 py-2 rounded-lg font-bold transition-all hover:bg-slate-800">
                    <span id="edit-text">編輯模式</span>
                </button>
            </div>
            <div class="bg-white p-2 rounded-2xl card-shadow overflow-x-auto text-left">
                <div id="matrix-container" class="matrix-grid min-w-[1500px]"></div>
            </div>
        </section>

        <section id="tab-analytics" class="hidden space-y-6">
            <div class="bg-white p-8 rounded-2xl card-shadow">
                <h3 class="font-bold text-slate-700 mb-8 text-left">各主題加權成熟度百分比</h3>
                <div class="chart-container"><canvas id="topicChart"></canvas></div>
            </div>
        </section>
    </main>

    <div id="reportModal" class="modal text-left">
        <div class="modal-content text-left">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800 text-left">每週管理簡報內容</h2>
                <button onclick="closeReportModal()" class="text-slate-400 text-3xl">&times;</button>
            </div>
            <div id="report-text" class="bg-slate-50 p-8 rounded-2xl text-slate-700 text-sm font-mono whitespace-pre-wrap leading-relaxed text-left"></div>
            <div class="mt-8 flex justify-end">
                <button onclick="copyReport()" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-xl hover:bg-blue-700">複製文字</button>
            </div>
        </div>
    </div>

    <script type="module">
        const technicians = ["Todd", "Jacob", "Jake", "Stevenson", "Tyler", "Kevin", "LEO", "Andy"];
        const topics = [
            { id: 1, cn: "接線圖閱讀", weight: 0.15, items: ["1.1", "1.2", "1.3", "1.4", "1.5"] },
            { id: 2, cn: "通用電氣故障排除", weight: 0.15, items: ["2.1", "2.2", "2.3", "2.4", "2.5"] },
            { id: 3, cn: "控制系統故障排除和維修", weight: 0.15, items: ["3.1", "3.2", "3.3", "3.4", "3.5"] },
            { id: 4, cn: "PLC/DCS 理解", weight: 0.10, items: ["4.1", "4.2", "4.3", "4.4", "4.5"] },
            { id: 5, cn: "輕微的程序操作", weight: 0.10, items: ["5.1", "5.2", "5.3", "5.4", "5.5"] },
            { id: 6, cn: "重大程式修改", weight: 0.15, items: ["6.1", "6.2", "6.3", "6.4", "6.5"] },
            { id: 7, cn: "導管彎曲和佈局", weight: 0.10, items: ["7.1", "7.2", "7.3", "7.4", "7.5"] },
            { id: 8, cn: "線路檢查標準", weight: 0.10, items: ["8.1", "8.2", "8.3", "8.4", "8.5"] }
        ];

        // 根據圖片內容更新預設映射
        const defaultItemMapping = {
            "1.1": "Wiring Configuration-Implementation接線配置-實作",
            "1.2": "電工技師學徒考試",
            "1.3": "basic concepts&definitions基本電學概念",
            "1.4": "待定項目 1.4", "1.5": "待定項目 1.5",
            "2.1": "motors&Electrical maintenance(電機電氣維護)(二次平均)",
            "2.2": "系統及馬達檢查",
            "2.3": "General Electrical Troubleshooting一般電器故障排除",
            "2.4": "Instrument Usage儀器使用",
            "2.5": "Motor Troubleshooting馬達故障排除-實作",
            "3.1": "現場故障測試-真空",
            "3.2": "現場故障排除測試-溫度異常 (初階)",
            "3.3": "現場故障排除測試-故障位置 (初階)",
            "3.4": "現場故障測試-電機",
            "3.5": "安全連鎖意識",
            "4.1": "E300 控制器", "4.2": "硬體故障診斷", "4.3": "邏輯解釋", "4.4": "EIOC 設置", "4.5": "VFD 設定",
            "8.1": "電子零件辨識", "8.2": "電機接線實踐", "8.3": "自保持電路", "8.4": "VFD 參數設定", "8.5": "線路配置與排除"
        };
        for(let i=5; i<=7; i++) { for(let j=1; j<=5; j++) { let id = `${i}.${j}`; if(!defaultItemMapping[id]) defaultItemMapping[id] = `待定項目 ${id}`; } }

        const DB_KEY = 'skill_db_data_v4';
        const MAP_KEY = 'skill_db_map_v4';
        window.appData = {};
        window.itemMapping = {}; 
        window.state = { currentTab: 'report', isEditMode: false };

        const loadLocal = () => {
            const savedData = localStorage.getItem(DB_KEY);
            const savedMap = localStorage.getItem(MAP_KEY);
            
            if (savedMap) window.itemMapping = JSON.parse(savedMap);
            else window.itemMapping = {...defaultItemMapping};

            if (savedData) window.appData = JSON.parse(savedData);
            else {
                Object.values(window.itemMapping).forEach(name => {
                    window.appData[name] = {};
                    technicians.forEach(t => window.appData[name][t] = "待測");
                });
                seedInitialData(window.appData);
            }
            document.getElementById('current-date').textContent = new Date().toLocaleDateString();
            updateUI();
        };

        const seedInitialData = (records) => {
            // 根據圖片填入完整數據
            const n13 = window.itemMapping["1.3"]; 
            records[n13] = { Todd: 88, Jacob: 88, Jake: 55, Stevenson: 88, Tyler: 90, Kevin: 100, LEO: 80, Andy: 100 };
            
            const n23 = window.itemMapping["2.3"];
            records[n23] = { Todd: 75, Jacob: 70, Jake: 25, Stevenson: 70, Tyler: 75, Kevin: 100, LEO: 70, Andy: 100 };
            
            const n21 = window.itemMapping["2.1"];
            records[n21] = { Todd: 27, Jacob: 52, Jake: 33, Stevenson: 68, Tyler: 58, Kevin: 80, LEO: 65, Andy: 85 };
            
            const n11 = window.itemMapping["1.1"];
            records[n11] = { Todd: "X", Jacob: "X", Jake: "X", Stevenson: "✓", Tyler: "X", Kevin: "✓", LEO: "✓", Andy: "✓" };
            
            const n25 = window.itemMapping["2.5"];
            records[n25] = { Todd: "✓", Jacob: "✓", Jake: "X", Stevenson: "✓", Tyler: "✓", Kevin: "✓", LEO: "待測", Andy: "✓" };
            
            const n24 = window.itemMapping["2.4"];
            records[n24] = { Todd: "✓", Jacob: "✓", Jake: "待測", Stevenson: "✓", Tyler: "✓", Kevin: "✓", LEO: "✓", Andy: "✓" };
            
            const n33 = window.itemMapping["3.3"];
            records[n33] = { Todd: "✓", Jacob: "✓", Jake: "待測", Stevenson: "待測", Tyler: "待測", Kevin: "✓", LEO: "待測", Andy: "✓" };
            
            const n32 = window.itemMapping["3.2"];
            records[n32] = { Todd: "✓", Jacob: "✓", Jake: "待測", Stevenson: "待測", Tyler: "待測", Kevin: "✓", LEO: "待測", Andy: "✓" };
        };

        const calculateStats = () => {
            let totalPossible = 0, doneCount = 0;
            const techStatus = technicians.map(n => ({ name: n, weightSum: 0, rawSum: 0, doneCount: 0, totalCount: 0 }));
            const topicScores = topics.map(t => ({ cn: t.cn, avg: 0 }));
            const itemPerformance = [];

            topics.forEach((topic, tIdx) => {
                let topicTeamSum = 0;
                topic.items.forEach(itemId => {
                    const name = window.itemMapping[itemId];
                    let itemSum = 0, itemTestedCount = 0;
                    technicians.forEach((tech, techIdx) => {
                        totalPossible++;
                        techStatus[techIdx].totalCount++;
                        const val = window.appData[name]?.[tech] || "待測";
                        let num = null;
                        if (val === "✓") num = 100; else if (val === "X") num = 0; else if (typeof val === 'number') num = val;
                        
                        if (num !== null) { 
                            doneCount++; techStatus[techIdx].doneCount++;
                            techStatus[techIdx].weightSum += (num * (topic.weight / 5)); 
                            techStatus[techIdx].rawSum += num;
                            topicTeamSum += num; itemSum += num; itemTestedCount++;
                        }
                    });
                    if(itemTestedCount > 0) itemPerformance.push({ id: itemId, cn: name, avg: itemSum / itemTestedCount });
                });
                topicScores[tIdx].avg = topicTeamSum / (technicians.length * 5);
            });
            return { progress: (doneCount / totalPossible) * 100, avg: techStatus.reduce((a,b) => a + b.weightSum, 0) / technicians.length, techs: techStatus, topics: topicScores, items: itemPerformance.sort((a,b) => a.avg - b.avg) };
        };

        const renderSummary = (s) => {
            document.getElementById('stat-progress').textContent = s.progress.toFixed(1) + '%';
            document.getElementById('progress-bar-inner').style.width = s.progress + '%';
            document.getElementById('stat-avg-score').textContent = s.avg.toFixed(1);
            const practicalItems = s.items.filter(i => i.cn.includes("實作") || i.cn.includes("測試"));
            const pracAvg = practicalItems.length > 0 ? practicalItems.reduce((a,b) => a + b.avg, 0) / practicalItems.length : 0;
            document.getElementById('stat-practical').textContent = pracAvg.toFixed(1) + '%';
            document.getElementById('stat-attention').textContent = s.items.filter(i => i.avg < 60).length;

            const gapDiv = document.getElementById('skill-gaps');
            gapDiv.innerHTML = s.items.length === 0 ? `<div class="py-10 text-center italic text-slate-300">尚未有考核數據</div>` :
                s.items.slice(0, 4).map(item => `<div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100 text-left"><div class="flex flex-col text-left"><span class="text-[9px] font-bold text-rose-400 uppercase">ID ${item.id}</span><span class="text-sm font-bold text-slate-700 text-left">${item.cn}</span></div><div class="text-right"><span class="text-rose-500 font-black text-lg">${item.avg.toFixed(1)}%</span></div></div>`).join('');

            const tbody = document.getElementById('personnel-status-body');
            tbody.innerHTML = s.techs.map(t => {
                const rawAvg = t.doneCount > 0 ? (t.rawSum / t.doneCount).toFixed(1) : "0.0";
                return `<tr class="border-b last:border-0 hover:bg-slate-50 transition-colors">
                    <td class="py-4 font-bold text-slate-700 text-left">${t.name}</td>
                    <td class="py-4 text-left">
                        <div class="flex items-center gap-2">
                            <div class="w-24 bg-slate-100 h-2 rounded-full overflow-hidden"><div class="bg-blue-600 h-full rounded-full" style="width:${(t.doneCount/t.totalCount*100)}%"></div></div>
                            <span class="text-xs font-semibold text-slate-500">${(t.doneCount/t.totalCount*100).toFixed(0)}%</span>
                        </div>
                    </td>
                    <td class="py-4 font-bold text-slate-600 text-base">${rawAvg}%</td>
                    <td class="py-4 font-black text-blue-600 text-lg">${t.weightSum.toFixed(1)}</td>
                    <td class="py-4 text-xs text-slate-400 text-right">${t.doneCount}/${t.totalCount} 項已完成</td>
                </tr>`}).join('');
            renderCharts(s.topics);
        };

        let charts = {};
        const renderCharts = (topicData) => {
            const ctx1 = document.getElementById('radarChartSummary').getContext('2d'); if(charts.radar) charts.radar.destroy();
            charts.radar = new Chart(ctx1, { type: 'radar', data: { labels: topicData.map(t => t.cn), datasets: [{ data: topicData.map(t => t.avg), fill: true, backgroundColor: 'rgba(37, 99, 235, 0.2)', borderColor: 'rgb(37, 99, 235)' }] }, options: { maintainAspectRatio: false, scales: { r: { suggestMin: 0, suggestMax: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } } });
        };

        const renderMatrix = () => {
            const container = document.getElementById('matrix-container'); container.innerHTML = '';
            const corner = document.createElement('div'); corner.className = 'matrix-cell matrix-header'; corner.textContent = `項目 ID / 名稱`; container.appendChild(corner);
            technicians.forEach(t => { const h = document.createElement('div'); h.className = 'matrix-cell matrix-header'; h.textContent = t; container.appendChild(h); });
            topics.forEach(topic => {
                const sep = document.createElement('div'); sep.className = 'matrix-cell topic-sep py-4 h-auto text-left'; sep.textContent = `領域: ${topic.cn} (${topic.weight*100}%)`; container.appendChild(sep);
                topic.items.forEach(itemId => {
                    const name = window.itemMapping[itemId]; const label = document.createElement('div'); label.className = 'matrix-cell matrix-row-label';
                    if(window.state.isEditMode) {
                        const ni = document.createElement('input'); ni.className = 'edit-name-input'; ni.value = name; ni.dataset.itemId = itemId;
                        label.innerHTML = `<span class="text-[9px] font-bold mr-2">ID ${itemId}</span>`; label.appendChild(ni);
                    } else {
                        label.innerHTML = `<span class="text-[9px] font-bold mr-2">ID ${itemId}</span> <div class="text-[10px] font-bold text-left">${name}</div>`;
                    }
                    container.appendChild(label);
                    technicians.forEach(tech => {
                        const cell = document.createElement('div'); cell.className = 'matrix-cell'; const val = window.appData[name]?.[tech] || "待測";
                        if (window.state.isEditMode) { const i = document.createElement('input'); i.className = 'edit-input'; i.value = val; i.dataset.itemName = name; i.dataset.tech = tech; cell.appendChild(i); }
                        else {
                            cell.textContent = val;
                            if (val === '✓') cell.classList.add('status-pass'); else if (val === 'X') cell.classList.add('status-fail'); else if (val === '待測') cell.classList.add('status-pending');
                            else if (typeof val === 'number') { if (val >= 85) cell.classList.add('score-high'); else if (val >= 70) cell.classList.add('score-mid'); else cell.classList.add('score-low'); }
                        }
                        container.appendChild(cell);
                    });
                });
            });
        };

        window.toggleEditMode = () => {
            if (window.state.isEditMode) {
                const nameInputs = document.querySelectorAll('.edit-name-input');
                const newData = {};
                nameInputs.forEach(input => {
                    const oldName = window.itemMapping[input.dataset.itemId];
                    const newName = input.value.trim() || oldName;
                    window.itemMapping[input.dataset.itemId] = newName;
                    newData[newName] = window.appData[oldName] || {};
                });
                window.appData = newData;
                const scoreInputs = document.querySelectorAll('.edit-input');
                scoreInputs.forEach(i => {
                    const { tech } = i.dataset;
                    let v = i.value.trim();
                    if (v === "" || v === "待測") window.appData[i.dataset.itemName][tech] = "待測";
                    else if (v === "✓" || v.toLowerCase() === "v") window.appData[i.dataset.itemName][tech] = "✓";
                    else if (v === "X" || v.toLowerCase() === "x") window.appData[i.dataset.itemName][tech] = "X";
                    else if (!isNaN(v)) window.appData[i.dataset.itemName][tech] = Number(v);
                });
                localStorage.setItem(DB_KEY, JSON.stringify(window.appData));
                localStorage.setItem(MAP_KEY, JSON.stringify(window.itemMapping));
                window.state.isEditMode = false; document.getElementById('edit-text').textContent = '編輯模式';
            } else { window.state.isEditMode = true; document.getElementById('edit-text').textContent = '儲存變更'; }
            renderMatrix();
        };

        window.handleImport = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const reader = new FileReader(); reader.onload = (ev) => {
                const imp = JSON.parse(ev.target.result);
                if(imp.appData && imp.itemMapping) { window.appData = imp.appData; window.itemMapping = imp.itemMapping; }
                else { window.appData = imp; }
                localStorage.setItem(DB_KEY, JSON.stringify(window.appData));
                localStorage.setItem(MAP_KEY, JSON.stringify(window.itemMapping));
                updateUI(); alert("匯入成功");
            };
            reader.readAsText(f);
        };

        window.exportToExcel = () => {
            const flat = [];
            Object.keys(window.itemMapping).forEach(id => {
                const name = window.itemMapping[id]; let row = { "ID": id, "考核項目": name };
                technicians.forEach(t => row[t] = window.appData[name]?.[t] || "待測");
                flat.push(row);
            });
            const ws = XLSX.utils.json_to_sheet(flat); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Matrix");
            XLSX.writeFile(wb, "Skill_Database.xlsx");
        };

        window.switchTab = (t) => {
            document.querySelectorAll('section[id^="tab-"]').forEach(s => s.classList.add('hidden'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`btn-${t}`).classList.add('active');
            window.state.currentTab = t; updateUI();
        };

        window.openReportModal = () => {
            const s = calculateStats();
            document.getElementById('report-text').textContent = `考核報告\n日期: ${new Date().toLocaleDateString()}\n進度: ${s.progress.toFixed(1)}%\n平均: ${s.avg.toFixed(1)}`;
            document.getElementById('reportModal').style.display = "block";
        };
        window.closeReportModal = () => document.getElementById('reportModal').style.display = "none";
        window.copyReport = () => { navigator.clipboard.writeText(document.getElementById('report-text').textContent); alert("已複製"); };

        const updateUI = () => {
            const s = calculateStats();
            if (window.state.currentTab === 'report') renderSummary(s);
            if (window.state.currentTab === 'matrix') renderMatrix();
            if (window.state.currentTab === 'analytics') {
                const ctx = document.getElementById('topicChart').getContext('2d'); if(charts.topic) charts.topic.destroy();
                charts.topic = new Chart(ctx, { type: 'bar', data: { labels: s.topics.map(t => t.cn), datasets: [{ label: '成熟度 %', data: s.topics.map(t => t.avg), backgroundColor: '#3b82f6' }] }, options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } } });
            }
        };

        loadLocal();
    </script>
</body>
</html>
